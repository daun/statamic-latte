title: Page
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: content
            field:
              type: markdown
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
          -
            handle: parent
            field:
              type: entries
              collections:
                - pages
              max_items: 1
              listable: false
              localizable: true
          -
            handle: related_page
            field:
              type: entries
              collections:
                - pages
              max_items: 1
              listable: false
              localizable: true
          -
            handle: related_pages
            field:
              type: entries
              collections:
                - pages
              listable: false
              localizable: true
          -
            handle: meta
            field:
              type: group
              fields:
                -
                  handle: author
                  field:
                    type: text
                -
                  handle: featured_page
                  field:
                    type: entries
                    collections:
                      - pages
                    max_items: 1
          -
            handle: blocks
            field:
              type: grid
              fields:
                -
                  handle: heading
                  field:
                    type: text
